name: Scrape menus

on:
  schedule:
    # Run at 10:30 UTC Monday-Friday
    - cron: '30 10 * * 1-5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run scraper
        run: dotnet run --project scraper -- docs/menus.json

      - name: Commit updated menus.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/menus.json
          git diff --cached --quiet || git commit -m "Update menus $(date +%Y-%m-%d)"
          git push
